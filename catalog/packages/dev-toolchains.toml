# 软件目录分片：dev-toolchains
# 由原 catalog/packages.toml 按 group 拆分而来。

[[package]]
id = "rustup"
name = "rustup"
category = "development"
group = "dev-toolchains"
expr = "pkgs.rustup"
description = "Rust 工具链管理器。"
keywords = ["rust", "toolchain"]
source = "nixpkgs"

[[package]]
id = "gnumake"
name = "GNU Make"
category = "development"
group = "dev-toolchains"
expr = "pkgs.gnumake"
description = "传统构建调度工具。"
keywords = ["build", "make"]
source = "nixpkgs"

[[package]]
id = "cmake"
name = "CMake"
category = "development"
group = "dev-toolchains"
expr = "pkgs.cmake"
description = "C/C++ 常用构建系统。"
keywords = ["build", "cmake", "c++"]
source = "nixpkgs"

[[package]]
id = "clang-tools"
name = "Clang Tools"
category = "development"
group = "dev-toolchains"
expr = "pkgs.clang-tools"
description = "Clang 工具集。"
keywords = ["clang", "c", "c++"]
source = "nixpkgs"

[[package]]
id = "uv"
name = "uv"
category = "development"
group = "dev-toolchains"
expr = "pkgs.uv"
description = "现代 Python 包与环境工具。"
keywords = ["python", "venv", "package-manager"]
source = "nixpkgs"


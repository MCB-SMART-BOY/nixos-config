# 软件目录分片：cloud-containers

[[package]]
id = "podman"
name = "Podman"
category = "containers"
group = "cloud-containers"
expr = "pkgs.podman"
description = "无 daemon 的容器运行时。"
keywords = ["containers", "oci", "docker"]
workflow_tags = ["containers"]
lifecycle = "stable"
source = "nixpkgs"


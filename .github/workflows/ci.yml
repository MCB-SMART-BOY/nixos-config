name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo fmt --check
        run: cargo fmt --check --manifest-path mcbctl/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path mcbctl/Cargo.toml --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path mcbctl/Cargo.toml

  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: flake check
        run: NIX_CONFIG='experimental-features = nix-command flakes' nix flake check --option eval-cache false

      - name: repo-integrity
        run: nix run .#mcbctl -- repo-integrity

      - name: doctor
        run: nix run .#mcbctl -- doctor
